<svg width="860" height="480" viewBox="0 0 860 480"
  xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sistema de tipos TypeScript: primitivos, interfaces, generics y utility types">

  <!-- Background -->
  <rect width="860" height="480" fill="#0F172A"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="18" font-weight="700" fill="#F1F5F9">
    Sistema de Tipos TypeScript
  </text>
  <text x="430" y="56" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569" letter-spacing="1.5">
    SEMANA 01  ·  TYPESCRIPT ESENCIAL
  </text>

  <!-- ── ROW 1: Primitivos ─────────────────────────────────────── -->
  <text x="430" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#64748B" letter-spacing="1">
    NIVEL 1 — PRIMITIVOS Y LITERALES
  </text>

  <!-- string -->
  <rect x="60" y="96" width="90" height="30" rx="4" fill="#1E293B"/>
  <text x="105" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6EE7B7">string</text>

  <!-- number -->
  <rect x="165" y="96" width="90" height="30" rx="4" fill="#1E293B"/>
  <text x="210" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6EE7B7">number</text>

  <!-- boolean -->
  <rect x="270" y="96" width="90" height="30" rx="4" fill="#1E293B"/>
  <text x="315" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6EE7B7">boolean</text>

  <!-- literal -->
  <rect x="375" y="96" width="130" height="30" rx="4" fill="#1E293B"/>
  <text x="440" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#FCD34D">'a' | 'b' | 'c'</text>

  <!-- null / undefined -->
  <rect x="520" y="96" width="140" height="30" rx="4" fill="#1E293B"/>
  <text x="590" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#94A3B8">null | undefined</text>

  <!-- unknown -->
  <rect x="675" y="96" width="90" height="30" rx="4" fill="#FF4154" fill-opacity="0.15"/>
  <rect x="675" y="96" width="90" height="30" rx="4" fill="none" stroke="#FF4154" stroke-width="1" stroke-opacity="0.6"/>
  <text x="720" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FF4154">unknown</text>

  <!-- ── Divider ────────────────────────────────────────────────── -->
  <line x1="40" y1="144" x2="820" y2="144" stroke="#1E293B" stroke-width="1"/>

  <!-- ── ROW 2: Interface vs Type ──────────────────────────────── -->
  <text x="430" y="166" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#64748B" letter-spacing="1">
    NIVEL 2 — INTERFACE vs TYPE ALIAS
  </text>

  <!-- Interface card -->
  <rect x="60" y="176" width="340" height="90" rx="6" fill="#1E293B"/>
  <rect x="60" y="176" width="340" height="90" rx="6" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="80" y="198" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#3B82F6">interface User {</text>
  <text x="96" y="216" font-family="'Courier New', monospace" font-size="11" fill="#CBD5E1">  id: number</text>
  <text x="96" y="232" font-family="'Courier New', monospace" font-size="11" fill="#CBD5E1">  name: string</text>
  <text x="96" y="248" font-family="'Courier New', monospace" font-size="11" fill="#CBD5E1">  role?: 'admin' | 'user'</text>
  <text x="80" y="260" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#3B82F6">}</text>
  <text x="230" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">entidades de dominio</text>

  <!-- Type alias card -->
  <rect x="460" y="176" width="340" height="90" rx="6" fill="#1E293B"/>
  <rect x="460" y="176" width="340" height="90" rx="6" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="480" y="198" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#F59E0B">type ApiResponse&lt;T&gt; =</text>
  <text x="496" y="216" font-family="'Courier New', monospace" font-size="11" fill="#CBD5E1">  | { data: T; status: 'ok' }</text>
  <text x="496" y="232" font-family="'Courier New', monospace" font-size="11" fill="#CBD5E1">  | { error: string;</text>
  <text x="512" y="248" font-family="'Courier New', monospace" font-size="11" fill="#CBD5E1">      status: 'error' }</text>
  <text x="630" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">uniones · intersecciones</text>

  <!-- ── Divider ────────────────────────────────────────────────── -->
  <line x1="40" y1="284" x2="820" y2="284" stroke="#1E293B" stroke-width="1"/>

  <!-- ── ROW 3: Generics ───────────────────────────────────────── -->
  <text x="430" y="306" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#64748B" letter-spacing="1">
    NIVEL 3 — GENERICS Y UTILITY TYPES
  </text>

  <!-- Generic function -->
  <rect x="60" y="316" width="340" height="60" rx="6" fill="#1E293B"/>
  <rect x="60" y="316" width="340" height="60" rx="6" fill="none" stroke="#10B981" stroke-width="1.5"/>
  <text x="80" y="338" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#10B981">function first&lt;T&gt;(arr: T[]): T</text>
  <text x="80" y="356" font-family="'Courier New', monospace" font-size="11" fill="#94A3B8">// T se infiere al llamar la función</text>
  <text x="80" y="370" font-family="'Courier New', monospace" font-size="11" fill="#CBD5E1">// T extends { id: number }  ← restricción</text>

  <!-- Utility types -->
  <rect x="460" y="316" width="340" height="60" rx="6" fill="#1E293B"/>
  <rect x="460" y="316" width="340" height="60" rx="6" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="480" y="338" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#8B5CF6">Utility Types</text>
  <text x="480" y="356" font-family="'Courier New', monospace" font-size="11" fill="#CBD5E1">Partial&lt;T&gt;  Pick&lt;T,K&gt;  Omit&lt;T,K&gt;</text>
  <text x="480" y="372" font-family="'Courier New', monospace" font-size="11" fill="#CBD5E1">Required&lt;T&gt;  ReturnType&lt;F&gt;</text>

  <!-- ── Divider ────────────────────────────────────────────────── -->
  <line x1="40" y1="396" x2="820" y2="396" stroke="#1E293B" stroke-width="1"/>

  <!-- ── ROW 4: satisfies ──────────────────────────────────────── -->
  <text x="430" y="416" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#64748B" letter-spacing="1">
    NIVEL 4 — OPERADOR satisfies (TypeScript 4.9+)
  </text>

  <rect x="60" y="424" width="340" height="36" rx="4" fill="#FF4154" fill-opacity="0.08"/>
  <rect x="60" y="424" width="340" height="36" rx="4" fill="none" stroke="#FF4154" stroke-width="1" stroke-opacity="0.4"/>
  <text x="80" y="438" font-family="'Courier New', monospace" font-size="11" fill="#94A3B8">// ❌ as — oculta errores</text>
  <text x="80" y="454" font-family="'Courier New', monospace" font-size="11" fill="#CBD5E1">const x = { a: 1 } as Record&lt;string, string&gt;</text>

  <rect x="460" y="424" width="340" height="36" rx="4" fill="#10B981" fill-opacity="0.08"/>
  <rect x="460" y="424" width="340" height="36" rx="4" fill="none" stroke="#10B981" stroke-width="1" stroke-opacity="0.4"/>
  <text x="480" y="438" font-family="'Courier New', monospace" font-size="11" fill="#94A3B8">// ✅ satisfies — valida y mantiene tipo</text>
  <text x="480" y="454" font-family="'Courier New', monospace" font-size="11" fill="#CBD5E1">const x = { a: '#fff' } satisfies Record&lt;string, string&gt;</text>

</svg>
