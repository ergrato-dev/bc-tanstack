<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" width="860" height="480"
  role="img" aria-label="Sistema de tipos TypeScript: pirámide de abstracción" font-family="Inter, Roboto, system-ui, sans-serif">

  <!-- Fondo -->
  <rect width="860" height="480" fill="#0F172A"/>

  <!-- Título -->
  <text x="430" y="36" text-anchor="middle" fill="#F1F5F9" font-size="18" font-weight="700">
    Sistema de Tipos TypeScript — Pirámide de Abstracción
  </text>
  <text x="430" y="56" text-anchor="middle" fill="#64748B" font-size="11">
    Cada capa se construye sobre la anterior
  </text>

  <!-- ===== CAPA 1 (base) — Primitivos ===== -->
  <polygon points="80,430 780,430 720,360 140,360" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="430" y="404" text-anchor="middle" fill="#93C5FD" font-size="13" font-weight="700">CAPA 1 — Primitivos</text>
  <text x="430" y="422" text-anchor="middle" fill="#64748B" font-size="11">string · number · boolean · null · undefined · symbol</text>

  <!-- ===== CAPA 2 — Interfaces y Types ===== -->
  <polygon points="140,356 720,356 660,286 200,286" fill="#1E3A2A" stroke="#22C55E" stroke-width="1.5"/>
  <text x="430" y="328" text-anchor="middle" fill="#86EFAC" font-size="13" font-weight="700">CAPA 2 — Interfaces y Type Aliases</text>
  <text x="430" y="346" text-anchor="middle" fill="#64748B" font-size="11">interface User { id: number } · type ID = string | number</text>

  <!-- ===== CAPA 3 — Generics ===== -->
  <polygon points="200,282 660,282 600,212 260,212" fill="#2D1F47" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="430" y="254" text-anchor="middle" fill="#C4B5FD" font-size="13" font-weight="700">CAPA 3 — Generics y Utility Types</text>
  <text x="430" y="272" text-anchor="middle" fill="#64748B" font-size="11">Array&lt;T&gt; · Partial&lt;T&gt; · Pick&lt;T,K&gt; · ReturnType&lt;F&gt;</text>

  <!-- ===== CAPA 4 (cima) — satisfies ===== -->
  <polygon points="260,208 600,208 540,138 320,138" fill="#3B2A14" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="430" y="176" text-anchor="middle" fill="#FCD34D" font-size="13" font-weight="700">CAPA 4 — satisfies</text>
  <text x="430" y="194" text-anchor="middle" fill="#64748B" font-size="11">const config = { ... } satisfies Config</text>

  <!-- ===== Pico — TypeScript completo ===== -->
  <polygon points="320,134 540,134 430,80" fill="#1E293B" stroke="#F1F5F9" stroke-width="1.5"/>
  <text x="430" y="116" text-anchor="middle" fill="#F1F5F9" font-size="11" font-weight="700">TypeScript</text>

  <!-- Leyenda lateral izquierda -->
  <text x="50" y="200" text-anchor="middle" fill="#94A3B8" font-size="10" transform="rotate(-90,50,300)">Mayor abstracción ↑</text>
  <line x1="65" y1="140" x2="65" y2="430" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Leyenda inferior -->
  <rect x="60" y="447" width="740" height="24" fill="#1E293B" rx="4"/>
  <circle cx="110" cy="459" r="5" fill="#3B82F6"/>
  <text x="122" y="463" fill="#94A3B8" font-size="10">Primitivos</text>
  <circle cx="220" cy="459" r="5" fill="#22C55E"/>
  <text x="232" y="463" fill="#94A3B8" font-size="10">Interfaces / Types</text>
  <circle cx="370" cy="459" r="5" fill="#A78BFA"/>
  <text x="382" y="463" fill="#94A3B8" font-size="10">Generics / Utility Types</text>
  <circle cx="545" cy="459" r="5" fill="#F59E0B"/>
  <text x="557" y="463" fill="#94A3B8" font-size="10">satisfies operator</text>
  <text x="730" y="463" fill="#64748B" font-size="10">© Semana 01</text>
</svg>
