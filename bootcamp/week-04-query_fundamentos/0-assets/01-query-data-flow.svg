<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" width="860" height="500" font-family="Inter, Roboto, system-ui, sans-serif">

  <!-- Fondo -->
  <rect width="860" height="500" fill="#0F172A"/>

  <!-- Título -->
  <text x="430" y="36" fill="#F8FAFC" font-size="15" font-weight="700" text-anchor="middle" letter-spacing="0.5">
    FLUJO DE DATOS — TANSTACK QUERY
  </text>

  <!-- ══════════════════════════════════════
       NODO 1: Componente React
  ══════════════════════════════════════ -->
  <rect x="330" y="58" width="200" height="52" rx="8" fill="#1E293B" stroke="#FF4154" stroke-width="2"/>
  <text x="430" y="79" fill="#FF4154" font-size="11" font-weight="700" text-anchor="middle">COMPONENTE REACT</text>
  <text x="430" y="97" fill="#94A3B8" font-size="10" text-anchor="middle">useQuery({ queryKey, queryFn })</text>

  <!-- Flecha: Componente → QueryClient -->
  <line x1="430" y1="110" x2="430" y2="138" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="430,142 425,134 435,134" fill="#475569"/>

  <!-- ══════════════════════════════════════
       NODO 2: QueryClient Cache
  ══════════════════════════════════════ -->
  <rect x="295" y="142" width="270" height="52" rx="8" fill="#1E293B" stroke="#FF4154" stroke-width="2"/>
  <text x="430" y="163" fill="#FF4154" font-size="11" font-weight="700" text-anchor="middle">QUERYCLIENT CACHE</text>
  <text x="430" y="181" fill="#94A3B8" font-size="10" text-anchor="middle">new QueryClient({ defaultOptions })</text>

  <!-- Flecha: Cache → Diamante -->
  <line x1="430" y1="194" x2="430" y2="226" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="430,230 425,222 435,222" fill="#475569"/>

  <!-- ══════════════════════════════════════
       NODO 3: Diamante decisión
  ══════════════════════════════════════ -->
  <polygon points="430,230 510,266 430,302 350,266" fill="#1E293B" stroke="#F59E0B" stroke-width="2"/>
  <text x="430" y="261" fill="#F59E0B" font-size="10" font-weight="700" text-anchor="middle">¿Datos en</text>
  <text x="430" y="276" fill="#F59E0B" font-size="10" font-weight="700" text-anchor="middle">cache FRESH?</text>

  <!-- Rama SÍ → izquierda -->
  <line x1="350" y1="266" x2="220" y2="266" stroke="#22C55E" stroke-width="1.5"/>
  <polygon points="216,266 224,261 224,271" fill="#22C55E"/>
  <text x="285" y="258" fill="#22C55E" font-size="10" font-weight="600" text-anchor="middle">SÍ</text>

  <!-- Nodo: Datos del cache -->
  <rect x="90" y="241" width="126" height="50" rx="8" fill="#1E293B" stroke="#22C55E" stroke-width="2"/>
  <text x="153" y="262" fill="#22C55E" font-size="10" font-weight="700" text-anchor="middle">DATOS DEL CACHE</text>
  <text x="153" y="278" fill="#94A3B8" font-size="9" text-anchor="middle">stale = false → retorno</text>
  <text x="153" y="290" fill="#94A3B8" font-size="9" text-anchor="middle">inmediato al componente</text>

  <!-- Flecha desde Datos del cache → Componente (curva hacia arriba) -->
  <path d="M 153 241 Q 153 110 330 84" fill="none" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="330,84 322,80 326,89" fill="#22C55E"/>
  <text x="108" y="188" fill="#22C55E" font-size="9" text-anchor="middle">data retornada</text>
  <text x="108" y="200" fill="#22C55E" font-size="9" text-anchor="middle">al componente</text>

  <!-- Rama NO → derecha -->
  <line x1="510" y1="266" x2="640" y2="266" stroke="#3B82F6" stroke-width="1.5"/>
  <polygon points="644,266 636,261 636,271" fill="#3B82F6"/>
  <text x="577" y="258" fill="#3B82F6" font-size="10" font-weight="600" text-anchor="middle">NO</text>

  <!-- Nodo: queryFn ejecutada -->
  <rect x="644" y="241" width="140" height="50" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="2"/>
  <text x="714" y="260" fill="#3B82F6" font-size="10" font-weight="700" text-anchor="middle">queryFn EJECUTADA</text>
  <text x="714" y="276" fill="#94A3B8" font-size="9" text-anchor="middle">isPending = true</text>
  <text x="714" y="288" fill="#94A3B8" font-size="9" text-anchor="middle">fetch / axios / …</text>

  <!-- Flecha: queryFn → Servidor -->
  <line x1="714" y1="291" x2="714" y2="330" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="714,334 709,326 719,326" fill="#475569"/>

  <!-- Nodo: Servidor / API -->
  <rect x="644" y="334" width="140" height="50" rx="8" fill="#1E293B" stroke="#A78BFA" stroke-width="2"/>
  <text x="714" y="354" fill="#A78BFA" font-size="10" font-weight="700" text-anchor="middle">SERVIDOR / API</text>
  <text x="714" y="370" fill="#94A3B8" font-size="9" text-anchor="middle">HTTP 200 → JSON</text>
  <text x="714" y="382" fill="#94A3B8" font-size="9" text-anchor="middle">HTTP 4xx/5xx → Error</text>

  <!-- Flecha: Servidor → Cache actualizado -->
  <line x1="714" y1="384" x2="714" y2="420" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="714,424 709,416 719,416" fill="#475569"/>

  <!-- Nodo: Cache actualizado -->
  <rect x="620" y="424" width="188" height="50" rx="8" fill="#1E293B" stroke="#FF4154" stroke-width="2"/>
  <text x="714" y="444" fill="#FF4154" font-size="10" font-weight="700" text-anchor="middle">CACHE ACTUALIZADO</text>
  <text x="714" y="460" fill="#94A3B8" font-size="9" text-anchor="middle">isSuccess = true · stale = false</text>
  <text x="714" y="472" fill="#94A3B8" font-size="9" text-anchor="middle">componente re-renderiza</text>

  <!-- Flecha larga: Cache actualizado → Componente React (curva izquierda) -->
  <path d="M 620 449 Q 430 449 430 110" fill="none" stroke="#FF4154" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="430,110 425,118 435,118" fill="#FF4154"/>

  <!-- ══════════════════════════════════════
       LEYENDA
  ══════════════════════════════════════ -->
  <rect x="18" y="434" width="290" height="52" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="163" y="452" fill="#94A3B8" font-size="10" font-weight="600" text-anchor="middle">LEYENDA</text>
  <!-- Fresh -->
  <line x1="28" y1="464" x2="50" y2="464" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="55" y="468" fill="#94A3B8" font-size="9">Cache FRESH</text>
  <!-- Fetch -->
  <line x1="115" y1="464" x2="137" y2="464" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="142" y="468" fill="#94A3B8" font-size="9">Fetch al servidor</text>
  <!-- Re-render -->
  <line x1="208" y1="464" x2="230" y2="464" stroke="#FF4154" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="235" y="468" fill="#94A3B8" font-size="9">Re-render</text>

  <!-- TanStack Query badge -->
  <rect x="660" y="16" width="182" height="30" rx="6" fill="#FF4154" fill-opacity="0.15" stroke="#FF4154" stroke-width="1"/>
  <text x="751" y="36" fill="#FF4154" font-size="11" font-weight="700" text-anchor="middle">TanStack Query v5</text>

</svg>
