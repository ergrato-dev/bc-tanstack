<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Fondo -->
  <rect width="900" height="500" fill="#0F172A" rx="12"/>

  <!-- Título -->
  <text x="450" y="38" text-anchor="middle" fill="#F1F5F9" font-size="18" font-weight="700">Context API — Flujo de datos sin prop-drilling</text>

  <!-- ======= SIN CONTEXT (izquierda) ======= -->
  <text x="210" y="72" text-anchor="middle" fill="#EF4444" font-size="13" font-weight="600">❌ Prop-drilling</text>

  <!-- App -->
  <rect x="160" y="82" width="100" height="36" fill="#1E293B" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="210" y="105" text-anchor="middle" fill="#F1F5F9" font-size="11">App</text>

  <!-- Flecha con prop -->
  <line x1="210" y1="118" x2="210" y2="145" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="225" y="138" fill="#EF4444" font-size="9">theme</text>

  <!-- Layout -->
  <rect x="145" y="145" width="130" height="36" fill="#1E293B" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="210" y="168" text-anchor="middle" fill="#F1F5F9" font-size="11">Layout</text>

  <!-- Flecha con prop -->
  <line x1="210" y1="181" x2="210" y2="208" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="225" y="200" fill="#EF4444" font-size="9">theme</text>

  <!-- Sidebar -->
  <rect x="130" y="208" width="160" height="36" fill="#1E293B" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="210" y="231" text-anchor="middle" fill="#F1F5F9" font-size="11">Sidebar</text>

  <!-- Flecha con prop -->
  <line x1="210" y1="244" x2="210" y2="271" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="225" y="263" fill="#EF4444" font-size="9">theme</text>

  <!-- ThemeButton -->
  <rect x="115" y="271" width="190" height="36" fill="#1E293B" rx="6" stroke="#EF4444" stroke-width="1"/>
  <text x="210" y="294" text-anchor="middle" fill="#FCA5A5" font-size="11">ThemeButton 🎯</text>

  <text x="210" y="340" text-anchor="middle" fill="#64748B" font-size="10">prop pasada por 3 niveles</text>
  <text x="210" y="355" text-anchor="middle" fill="#64748B" font-size="10">aunque Layout y Sidebar</text>
  <text x="210" y="370" text-anchor="middle" fill="#64748B" font-size="10">no necesitan theme</text>

  <!-- ======= DIVISOR ======= -->
  <line x1="440" y1="70" x2="440" y2="430" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ======= CON CONTEXT (derecha) ======= -->
  <text x="670" y="72" text-anchor="middle" fill="#22C55E" font-size="13" font-weight="600">✅ Context API</text>

  <!-- ThemeProvider envuelve todo -->
  <rect x="490" y="82" width="370" height="310" fill="#0F172A" rx="8" stroke="#166534" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="675" y="100" text-anchor="middle" fill="#86EFAC" font-size="10" font-weight="600">ThemeProvider</text>

  <!-- App -->
  <rect x="615" y="110" width="120" height="36" fill="#1E293B" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="675" y="133" text-anchor="middle" fill="#F1F5F9" font-size="11">App</text>

  <!-- Flecha normal (sin prop) -->
  <line x1="675" y1="146" x2="675" y2="170" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Layout -->
  <rect x="600" y="170" width="150" height="36" fill="#1E293B" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="675" y="193" text-anchor="middle" fill="#F1F5F9" font-size="11">Layout</text>

  <!-- Flecha normal -->
  <line x1="675" y1="206" x2="675" y2="230" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Sidebar -->
  <rect x="585" y="230" width="180" height="36" fill="#1E293B" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="675" y="253" text-anchor="middle" fill="#F1F5F9" font-size="11">Sidebar</text>

  <!-- Flecha normal -->
  <line x1="675" y1="266" x2="675" y2="290" stroke="#334155" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ThemeButton accede directo -->
  <rect x="570" y="290" width="210" height="36" fill="#1E293B" rx="6" stroke="#22C55E" stroke-width="1"/>
  <text x="675" y="313" text-anchor="middle" fill="#86EFAC" font-size="11">ThemeButton 🎯</text>

  <!-- Línea desde context al botón -->
  <line x1="545" y1="196" x2="545" y2="308" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="545" y1="308" x2="570" y2="308" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="510" y="255" fill="#86EFAC" font-size="9" transform="rotate(-90,510,255)">useTheme()</text>

  <text x="675" y="356" text-anchor="middle" fill="#64748B" font-size="10">ThemeButton consume el contexto</text>
  <text x="675" y="371" text-anchor="middle" fill="#64748B" font-size="10">directamente con useTheme()</text>

  <!-- ======= Leyenda inferior ======= -->
  <rect x="30" y="450" width="840" height="38" fill="#1E293B" rx="4"/>
  <text x="450" y="463" text-anchor="middle" fill="#94A3B8" font-size="10" font-weight="600">Patrón Context API: createContext → Provider → useContext hook con null guard</text>
  <text x="450" y="479" text-anchor="middle" fill="#64748B" font-size="10">Memorizar el value del Provider con useMemo para evitar re-renders globales</text>

  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#EF4444"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#22C55E"/>
    </marker>
  </defs>
</svg>
