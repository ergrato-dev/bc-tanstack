<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" font-family="Inter, Roboto, system-ui, sans-serif">
  <!-- Fondo -->
  <rect width="900" height="520" fill="#0F172A" rx="12"/>

  <!-- Título -->
  <text x="450" y="42" text-anchor="middle" fill="#F1F5F9" font-size="18" font-weight="700">Ciclo de Vida de Hooks en React 19</text>

  <!-- ======= COLUMNAS (3) ======= -->

  <!-- Col 1: useState -->
  <rect x="30" y="70" width="250" height="400" fill="#1E293B" rx="8" stroke="#334155" stroke-width="1"/>
  <rect x="30" y="70" width="250" height="36" fill="#334155" rx="8"/>
  <rect x="30" y="94" width="250" height="12" fill="#334155"/>
  <text x="155" y="94" text-anchor="middle" fill="#93C5FD" font-size="13" font-weight="700">useState</text>

  <!-- Render inicial -->
  <rect x="50" y="120" width="210" height="44" fill="#0F172A" rx="6" stroke="#1D4ED8" stroke-width="1"/>
  <text x="155" y="137" text-anchor="middle" fill="#93C5FD" font-size="11" font-weight="600">Render inicial</text>
  <text x="155" y="153" text-anchor="middle" fill="#64748B" font-size="10">const [x, setX] = useState(0)</text>

  <!-- Flecha abajo -->
  <line x1="155" y1="164" x2="155" y2="188" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- setX(newValue) -->
  <rect x="50" y="188" width="210" height="44" fill="#0F172A" rx="6" stroke="#1D4ED8" stroke-width="1"/>
  <text x="155" y="205" text-anchor="middle" fill="#93C5FD" font-size="11" font-weight="600">Actualizar estado</text>
  <text x="155" y="221" text-anchor="middle" fill="#64748B" font-size="10">setX(prev =&gt; prev + 1)</text>

  <!-- Flecha abajo -->
  <line x1="155" y1="232" x2="155" y2="256" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Re-render -->
  <rect x="50" y="256" width="210" height="44" fill="#0F172A" rx="6" stroke="#1D4ED8" stroke-width="1"/>
  <text x="155" y="273" text-anchor="middle" fill="#93C5FD" font-size="11" font-weight="600">Re-render</text>
  <text x="155" y="289" text-anchor="middle" fill="#64748B" font-size="10">React actualiza el DOM</text>

  <!-- Nota -->
  <rect x="50" y="330" width="210" height="50" fill="#172554" rx="6" stroke="#1D4ED8" stroke-width="1"/>
  <text x="155" y="350" text-anchor="middle" fill="#BFDBFE" font-size="10">⚠️ Nunca mutar directamente</text>
  <text x="155" y="366" text-anchor="middle" fill="#64748B" font-size="10">count++ no causa re-render</text>

  <!-- ======= Col 2: useEffect ======= -->
  <rect x="325" y="70" width="250" height="400" fill="#1E293B" rx="8" stroke="#334155" stroke-width="1"/>
  <rect x="325" y="70" width="250" height="36" fill="#334155" rx="8"/>
  <rect x="325" y="94" width="250" height="12" fill="#334155"/>
  <text x="450" y="94" text-anchor="middle" fill="#86EFAC" font-size="13" font-weight="700">useEffect</text>

  <!-- Montar -->
  <rect x="345" y="120" width="210" height="44" fill="#0F172A" rx="6" stroke="#15803D" stroke-width="1"/>
  <text x="450" y="137" text-anchor="middle" fill="#86EFAC" font-size="11" font-weight="600">Montaje</text>
  <text x="450" y="153" text-anchor="middle" fill="#64748B" font-size="10">[] → ejecuta una vez</text>

  <!-- Flecha -->
  <line x1="450" y1="164" x2="450" y2="188" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Actualizar -->
  <rect x="345" y="188" width="210" height="44" fill="#0F172A" rx="6" stroke="#15803D" stroke-width="1"/>
  <text x="450" y="205" text-anchor="middle" fill="#86EFAC" font-size="11" font-weight="600">Actualización</text>
  <text x="450" y="221" text-anchor="middle" fill="#64748B" font-size="10">[dep] → cuando dep cambia</text>

  <!-- Flecha -->
  <line x1="450" y1="232" x2="450" y2="256" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Cleanup -->
  <rect x="345" y="256" width="210" height="44" fill="#0F172A" rx="6" stroke="#15803D" stroke-width="1"/>
  <text x="450" y="273" text-anchor="middle" fill="#86EFAC" font-size="11" font-weight="600">Cleanup (return)</text>
  <text x="450" y="289" text-anchor="middle" fill="#64748B" font-size="10">() =&gt; clearInterval(id)</text>

  <!-- Flecha -->
  <line x1="450" y1="300" x2="450" y2="324" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Desmontar -->
  <rect x="345" y="324" width="210" height="44" fill="#0F172A" rx="6" stroke="#15803D" stroke-width="1"/>
  <text x="450" y="341" text-anchor="middle" fill="#86EFAC" font-size="11" font-weight="600">Desmontaje</text>
  <text x="450" y="357" text-anchor="middle" fill="#64748B" font-size="10">Cleanup final ejecutado</text>

  <!-- ======= Col 3: useRef ======= -->
  <rect x="620" y="70" width="250" height="400" fill="#1E293B" rx="8" stroke="#334155" stroke-width="1"/>
  <rect x="620" y="70" width="250" height="36" fill="#334155" rx="8"/>
  <rect x="620" y="94" width="250" height="12" fill="#334155"/>
  <text x="745" y="94" text-anchor="middle" fill="#FCA5A5" font-size="13" font-weight="700">useRef</text>

  <!-- Caja ref -->
  <rect x="640" y="120" width="210" height="44" fill="#0F172A" rx="6" stroke="#B91C1C" stroke-width="1"/>
  <text x="745" y="137" text-anchor="middle" fill="#FCA5A5" font-size="11" font-weight="600">Objeto persistente</text>
  <text x="745" y="153" text-anchor="middle" fill="#64748B" font-size="10">{ current: null }</text>

  <!-- Flecha -->
  <line x1="745" y1="164" x2="745" y2="188" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DOM ref -->
  <rect x="640" y="188" width="210" height="44" fill="#0F172A" rx="6" stroke="#B91C1C" stroke-width="1"/>
  <text x="745" y="205" text-anchor="middle" fill="#FCA5A5" font-size="11" font-weight="600">Referencia a DOM</text>
  <text x="745" y="221" text-anchor="middle" fill="#64748B" font-size="10">&lt;input ref={inputRef} /&gt;</text>

  <!-- Flecha -->
  <line x1="745" y1="232" x2="745" y2="256" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Sin re-render -->
  <rect x="640" y="256" width="210" height="44" fill="#0F172A" rx="6" stroke="#B91C1C" stroke-width="1"/>
  <text x="745" y="273" text-anchor="middle" fill="#FCA5A5" font-size="11" font-weight="600">Mutable sin re-render</text>
  <text x="745" y="289" text-anchor="middle" fill="#64748B" font-size="10">ref.current = intervalId</text>

  <!-- Nota -->
  <rect x="640" y="330" width="210" height="50" fill="#450A0A" rx="6" stroke="#B91C1C" stroke-width="1"/>
  <text x="745" y="350" text-anchor="middle" fill="#FECACA" font-size="10">✅ No causa re-render</text>
  <text x="745" y="366" text-anchor="middle" fill="#64748B" font-size="10">Ideal para timers y DOM</text>

  <!-- ======= Leyenda inferior ======= -->
  <rect x="30" y="488" width="840" height="22" fill="#1E293B" rx="4"/>
  <circle cx="80" cy="499" r="5" fill="#93C5FD"/>
  <text x="92" y="503" fill="#94A3B8" font-size="10">useState — re-render</text>
  <circle cx="240" cy="499" r="5" fill="#86EFAC"/>
  <text x="252" y="503" fill="#94A3B8" font-size="10">useEffect — efectos</text>
  <circle cx="400" cy="499" r="5" fill="#FCA5A5"/>
  <text x="412" y="503" fill="#94A3B8" font-size="10">useRef — sin re-render</text>
  <text x="700" y="503" fill="#64748B" font-size="10">© Bootcamp TanStack · Semana 02</text>

  <!-- Marcadores de flecha -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
